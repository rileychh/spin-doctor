name: Build, Sign & Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7

      - name: Build app bundle
        run: |
          uv run python setup.py py2app > $RUNNER_TEMP/py2app.log 2>&1 || {
            cat $RUNNER_TEMP/py2app.log
            exit 1
          }

      - name: Import signing certificate
        env:
          DEVELOPER_ID_P12: ${{ secrets.DEVELOPER_ID_P12 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$DEVELOPER_ID_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$DEVELOPER_ID_P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Codesign app bundle
        env:
          IDENTITY: "Developer ID Application: HeSheng Xue (G582M7KCHL)"
        run: |
          APP="dist/Spin Doctor.app"
          # Sign Python.framework
          codesign --sign "$IDENTITY" --force --timestamp --options=runtime \
            "$APP/Contents/Frameworks/Python.framework/Versions/3.12/Python"
          # Sign all .so files
          find "$APP" -name "*.so" -exec codesign --sign "$IDENTITY" --force --timestamp --options=runtime {} \;
          # Sign all .dylib files
          find "$APP" -name "*.dylib" -exec codesign --sign "$IDENTITY" --force --timestamp --options=runtime {} \;
          # Sign the python interpreter
          codesign --sign "$IDENTITY" --force --timestamp --options=runtime \
            "$APP/Contents/MacOS/python"
          # Sign the main executable (with entitlements)
          codesign --sign "$IDENTITY" --force --timestamp --options=runtime \
            --entitlements entitlements.plist \
            "$APP/Contents/MacOS/Spin Doctor"
          # Sign the top-level app bundle
          codesign --sign "$IDENTITY" --force --timestamp --options=runtime \
            --entitlements entitlements.plist \
            "$APP"
          # Verify
          codesign --verify --deep --strict "$APP"

      - name: Notarize app bundle
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        run: |
          ditto -c -k --keepParent "dist/Spin Doctor.app" $RUNNER_TEMP/SpinDoctor.zip
          SUBMIT_OUT=$(xcrun notarytool submit $RUNNER_TEMP/SpinDoctor.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$APP_SPECIFIC_PASSWORD" \
            --wait 2>&1) || true
          echo "$SUBMIT_OUT"
          SUBMISSION_ID=$(echo "$SUBMIT_OUT" | grep 'id:' | head -1 | awk '{print $2}')
          if echo "$SUBMIT_OUT" | grep -q "status: Invalid"; then
            echo "::error::Notarization failed. Fetching log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --team-id "$TEAM_ID" \
              --password "$APP_SPECIFIC_PASSWORD"
            exit 1
          fi
          xcrun stapler staple "dist/Spin Doctor.app"

      - name: Create DMG
        run: |
          STAGING=$RUNNER_TEMP/dmg-staging
          mkdir -p "$STAGING"
          cp -a "dist/Spin Doctor.app" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "Spin Doctor" -srcfolder "$STAGING" -ov -format UDZO SpinDoctor.dmg
          codesign --force \
            --sign "Developer ID Application: HeSheng Xue (G582M7KCHL)" \
            --timestamp \
            SpinDoctor.dmg

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" SpinDoctor.dmg \
            --title "Spin Doctor ${{ steps.version.outputs.version }}" \
            --generate-notes
